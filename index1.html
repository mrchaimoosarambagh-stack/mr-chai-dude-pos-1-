    const playSound = (type) => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        if (type === 'tap') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(600, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.05);
          gain.gain.setValueAtTime(0.15, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.05);
          osc.start();
          osc.stop(ctx.currentTime + 0.05);
        } else if (type === 'success') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(523.25, ctx.currentTime);
          osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08);
          osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.16);
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.3);
          osc.start();
          osc.stop(ctx.currentTime + 0.3);
        }
      } catch (e) {}
    };

      const [customItemPrice, setCustomItemPrice] = useState('');

        category: 'Regular Shakes',

      useEffect(() => {

      useEffect(() => {
        localStorage.setItem('chaidude_menu', JSON.stringify(menuItems));
      }, [menuItems]);

      useEffect(() => {
        localStorage.setItem('chaidude_orders', JSON.stringify(orders));
      }, [orders]);

      useEffect(() => {
        localStorage.setItem('chaidude_expenses', JSON.stringify(expenses));
      }, [expenses]);

      useEffect(() => {
        localStorage.setItem('chaidude_gsheet_url', googleSheetUrl);
      }, [googleSheetUrl]);

      useEffect(() => {
        localStorage.setItem('chaidude_peak_mode', isPeakTime.toString());
      }, [isPeakTime]);

      useEffect(() => {
        localStorage.setItem('chaidude_peak_surge', peakSurgePct.toString());
      }, [peakSurgePct]);

      useEffect(() => {
        localStorage.setItem('chaidude_next_token', tokenNumber.toString());
      }, [tokenNumber]);

      useEffect(() => {

      }, [pinCode]);

      useEffect(() => {

        localStorage.setItem('chaidude_printer_address', printerAddress);
        localStorage.setItem('chaidude_printer_phone', printerPhone);

      const categories = useMemo(() => {
        const itemCats = menuItems.map(item => item.category);
        const combined = new Set([...customCategories, ...itemCats]);
        return Array.from(combined);
      }, [menuItems, customCategories]);

      const filteredItems = useMemo(() => {
        return menuItems.filter(item => {
          if (selectedCategory === 'Favorites ⭐') {
            const matchesSearch = item.name.toLowerCase().includes(searchQuery.toLowerCase());
            return item.favorite && matchesSearch;
          }
          const matchesCategory = item.category === selectedCategory;
          const matchesSearch = item.name.toLowerCase().includes(searchQuery.toLowerCase());
          return matchesCategory && matchesSearch;
        });
      }, [menuItems, selectedCategory, searchQuery]);

      const filteredSettingsItems = useMemo(() => {
        return menuItems.filter(item => {
          const q = settingsSearchQuery.toLowerCase();
          return item.name.toLowerCase().includes(q) || item.category.toLowerCase().includes(q);
        });
      }, [menuItems, settingsSearchQuery]);

      const cartTotals = useMemo(() => {
        const subtotal = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
        const peakSurgeAmount = isPeakTime ? Math.round(subtotal * (peakSurgePct / 100)) : 0;
        const finalTotal = Math.max(0, subtotal + peakSurgeAmount - Number(customDiscount));
        return { subtotal, peakSurge: peakSurgeAmount, discount: Number(customDiscount), total: finalTotal };
      }, [cart, isPeakTime, peakSurgePct, customDiscount]);

      const addToCart = (product) => {
        playSound('tap');
        setCart(prev => {
          const existing = prev.find(item => item.id === product.id);
          if (existing) {
            return prev.map(item => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
          }
          return [...prev, { ...product, quantity: 1 }];
        });
      };

      const removeFromCart = (productId) => {
        playSound('tap');
        setCart(prev => {
          const existing = prev.find(item => item.id === productId);
          if (existing.quantity === 1) {
            return prev.filter(item => item.id !== productId);
          }
          return prev.map(item => item.id === productId ? { ...item, quantity: item.quantity - 1 } : item);
        });
      };

      const removeAllFromCart = (productId) => {
        setCart(prev => prev.filter(item => item.id !== productId));
      };

      const clearCart = () => {
        setCart([]);
        setCustomDiscount(0);
        setSplitMethod({ UPI: 0, Cash: 0, Card: 0 });
      };

      const toggleFavorite = (itemId) => {
        setMenuItems(prev => prev.map(it => it.id === itemId ? { ...it, favorite: !it.favorite } : it));
      };

      const syncRecordWithGoogleSheet = async (type, recordData) => {
        if (!googleSheetUrl) return;
        setSyncStatus({ state: 'syncing', message: 'Syncing to Google Sheet...' });

        let displaySummary = recordData.itemsSummary;
        if (!displaySummary && recordData.items) {
          displaySummary = recordData.items.map(i => `${i.name} (x${i.quantity})`).join(', ');
        }

        const timestampStr = recordData.timestamp || "";
        const datePart = timestampStr.split(',')[0] || "";

        const payload = {
          type: type,
          date: datePart,
          timestamp: timestampStr,
          id: recordData.id,
          token: recordData.tokenNo || '-',
          detail: type === 'SALE' ? displaySummary : recordData.item,
          subtotal: type === 'SALE' ? recordData.subtotal : 0,
          chargeOrExpense: type === 'SALE' ? recordData.peakSurge : recordData.amount,
          discount: type === 'SALE' ? recordData.discount : 0,
          total: type === 'SALE' ? recordData.total : recordData.amount,
          paymentOrMode: type === 'SALE' ? (recordData.paymentMethod === 'Split' ? `Split (UPI:${recordData.splitBreakdown?.UPI || 0}, Cash:${recordData.splitBreakdown?.Cash || 0}, Card:${recordData.splitBreakdown?.Card || 0})` : recordData.paymentMethod) : recordData.category,
          notes: type === 'EXPENSE' ? recordData.notes : (recordData.isPeakTime ? 'Peak Mode Surcharge Applied' : 'Standard')
        };

        try {
          let attempt = 0;
          const sendRequest = async () => {
            return await fetch(googleSheetUrl, {
              method: 'POST',
              mode: 'no-cors',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
          };

          const delay = (ms) => new Promise(res => setTimeout(res, ms));
          
          while (attempt < 3) {
            try {
              await sendRequest();
              setSyncStatus({ state: 'success', message: 'Backed up to Google Sheets!' });
              break;
            } catch (err) {
              attempt++;
              if (attempt >= 3) throw err;
              await delay(Math.pow(2, attempt) * 1000);
            }
          }
        } catch (error) {
          setSyncStatus({ state: 'error', message: 'Sync failed. Local data preserved.' });
        }
      };

      const handleCheckout = () => {
        if (cart.length === 0) return;

        if (paymentMethod === 'Split') {
          const splitSum = Number(splitDetails.UPI || 0) + Number(splitDetails.Cash || 0) + Number(splitDetails.Card || 0);
          if (splitSum !== cartTotals.total) {
            alert(`Split payment sum (₹${splitSum}) must equal total bill amount (₹${cartTotals.total}).`);
            return;
          }
        }

        playSound('success');

        const storedDate = localStorage.getItem('chaidude_token_date');
        const todayStr = new Date().toLocaleDateString('en-IN');
        let currentTokenToUse = tokenNumber;

        if (storedDate !== todayStr) {
          localStorage.setItem('chaidude_token_date', todayStr);
          currentTokenToUse = 1;
        }

        const summaryText = cart.map(i => `${i.name}`).join(', ');

        const newOrder = {
          id: 'ORD-' + Date.now().toString().slice(-6),
          tokenNo: currentTokenToUse,
          timestamp: new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' }),
          rawDate: new Date().toISOString(),
          items: [...cart],
          itemsSummary: summaryText,
          subtotal: cartTotals.subtotal,
          peakSurge: cartTotals.peakSurge,
          discount: cartTotals.discount,
          total: cartTotals.total,
          paymentMethod: paymentMethod,
          splitBreakdown: paymentMethod === 'Split' ? { ...splitDetails } : null,
          isPeakTime: isPeakTime
        };

        const updatedOrders = [newOrder, ...orders];
        setOrders(updatedOrders);
        
        const nextToken = currentTokenToUse + 1;
        setTokenNumber(nextToken);
        localStorage.setItem('chaidude_next_token', nextToken.toString());

        if (googleSheetUrl) {
          syncRecordWithGoogleSheet('SALE', newOrder);
        }

        setCompletedOrderForPrint(newOrder);
        setPrintMode('customer');

      const triggerPrint = () => {
        setTimeout(() => {

      const handleShareReceipt = (order, mode) => {

        if (mode === 'customer') {
          message = `*MR. CHAI DUDE*\n${printerAddress}\nPh: ${printerPhone}\n\nToken #: ${order.tokenNo || '-'}\nInvoice: ${order.id}\nDate: ${order.timestamp}\n--------------------\n`;
          order.items.forEach(it => {
            message += `${it.name} x ${it.quantity} = ₹${it.price * it.quantity}\n`;
          });
          message += `--------------------\n`;
          message += `Subtotal: ₹${order.subtotal}\n`;
          if (order.peakSurge > 0) message += `Peak Surge: +₹${order.peakSurge}\n`;
          if (order.discount > 0) message += `Discount: -₹${order.discount}\n`;
          message += `*TOTAL PAYABLE: ₹${order.total}*\n`;
          message += `Paid via: ${order.paymentMethod}\n${printerGreeting}`;
        } else {
          message = `*KOT (KITCHEN SLIP)*\nToken #: ${order.tokenNo || '-'}\nOrder Ref: ${order.id}\nDate: ${order.timestamp}\n--------------------\n`;
          order.items.forEach(it => {
            message += `[ ] ${it.name} x ${it.quantity}\n`;
          });
        }

        if (navigator.share) {
          navigator.share({
            title: mode === 'customer' ? 'Mr Chai Dude Invoice' : 'Kitchen Slip',
            text: message
          }).catch(() => {
            copyTextToClipboard(message);
          });
        } else {
          copyTextToClipboard(message);
        }
      };

      const copyTextToClipboard = (text) => {

        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);

      const closeReceiptModalAndClear = () => {

      const handleRefundOrder = (orderId) => {

      const handleAddExpense = (e) => {

      const handleDeleteExpense = (expenseId) => {
        if (confirm("Delete this expense entry?")) {

        }
      };

      const filteredAnalyticsData = useMemo(() => {
        const now = new Date();
        const todayStr = now.toLocaleDateString('en-IN');

        const isWithinTimeframe = (record) => {
          if (!record.timestamp) return false;
          const recDateStr = record.timestamp.split(',')[0].trim();

          let recDate = record.rawDate ? new Date(record.rawDate) : null;
          if (!recDate || isNaN(recDate.getTime())) {
            const parts = recDateStr.split('/');
            if (parts.length === 3) {
              recDate = new Date(parts[2], parts[1] - 1, parts[0]);
            } else {
              recDate = new Date(recDateStr);
            }
          }
          
          if (timeframe === 'today') {
            return recDateStr === todayStr;
          }

          if (timeframe === 'weekly') {
            const diffTime = Math.abs(now - recDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays <= 7;
          } 

          if (timeframe === 'monthly') {
            const diffTime = Math.abs(now - recDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays <= 30;
          }

          if (timeframe === 'custom') {
            if (!startDate && !endDate) return true;
            const start = startDate ? new Date(startDate) : new Date('1970-01-01');
            const end = endDate ? new Date(endDate) : new Date('2099-12-31');
            end.setHours(23, 59, 59, 999);
            return recDate >= start && recDate <= end;
          }

          return true;
        };

        const filteredOrders = orders.filter(isWithinTimeframe);
        const filteredExpensesList = expenses.filter(isWithinTimeframe);

        const totalRevenue = filteredOrders.reduce((sum, o) => sum + o.total, 0);
        const totalExpenses = filteredExpensesList.reduce((sum, e) => sum + e.amount, 0);
        const totalPeakSurges = filteredOrders.reduce((sum, o) => sum + (o.peakSurge || 0), 0);
        const totalDiscounts = filteredOrders.reduce((sum, o) => sum + o.discount, 0);
        const totalTransactions = filteredOrders.length;
        
        let cashTotal = 0;
        let upiTotal = 0;
        let cardTotal = 0;

        filteredOrders.forEach(o => {
          if (o.paymentMethod === 'Cash') cashTotal += o.total;
          else if (o.paymentMethod === 'UPI') upiTotal += o.total;
          else if (o.paymentMethod === 'Card') cardTotal += o.total;
          else if (o.paymentMethod === 'Split' && o.splitBreakdown) {
            cashTotal += Number(o.splitBreakdown.Cash || 0);
            upiTotal += Number(o.splitBreakdown.UPI || 0);
            cardTotal += Number(o.splitBreakdown.Card || 0);
          }
        });

        const itemSales = {};
        filteredOrders.forEach(order => {
          const itemList = order.items || [];
          itemList.forEach(item => {
            if (!itemSales[item.name]) {
              itemSales[item.name] = { quantity: 0, revenue: 0 };
            }
            itemSales[item.name].quantity += item.quantity;
            itemSales[item.name].revenue += (item.price * item.quantity);
          });
        });

        const sortedBestSellers = Object.entries(itemSales)
          .map(([name, stats]) => ({ name, ...stats }))
          .sort((a, b) => b.quantity - a.quantity);

        return {
          ordersList: filteredOrders,
          expensesList: filteredExpensesList,
          totalRevenue,
          totalExpenses,
          totalPeakSurges,
          totalDiscounts,
          totalTransactions,
          cashTotal,
          upiTotal,
          cardTotal,
          bestSellers: sortedBestSellers
        };
      }, [orders, expenses, timeframe, startDate, endDate]);

      const handleExportCSV = () => {
        const headers = ['Type', 'Record ID', 'Token No', 'Timestamp', 'Date', 'Detail/Items Summary', 'Subtotal', 'Peak Surcharge / Expense Amt', 'Discount Applied', 'Total Paid/Expense', 'Mode/Category'];
        
        const salesRows = orders.map(o => {
          let summary = o.itemsSummary;
          if (!summary && o.items) {
            summary = o.items.map(i => `${i.name} (x${i.quantity})`).join(', ');
          }
          const dtPart = o.timestamp.split(',')[0].trim();
          return ['SALE', o.id, o.tokenNo || '-', `"${o.timestamp}"`, `"${dtPart}"`, `"${summary}"`, o.subtotal, o.peakSurge || 0, o.discount, o.total, o.paymentMethod];
        });

        const expenseRows = expenses.map(e => {
          const dtPart = e.timestamp.split(',')[0].trim();
          return ['EXPENSE', e.id, '-', `"${e.timestamp}"`, `"${dtPart}"`, `"${e.item}"`, 0, e.amount, 0, e.amount, e.category];
        });

        const csvContent = "data:text/csv;charset=utf-8," + [headers.join(','), ...salesRows.map(e => e.join(',')), ...expenseRows.map(e => e.join(','))].join('\n');
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `MrChaiDude_Ledger_${new Date().toLocaleDateString('en-IN').replace(/\//g, '_')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const handleExportBackup = () => {
        const stateDump = {
          customCategories,
          menu: menuItems,
          orders: orders,
          expenses: expenses,
          googleSheetUrl,
          isPeakTime,
          peakSurgePct,
          tokenNumber,
          printerWidth,
          printerAddress,
          printerPhone,
          printerGreeting
        };
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(stateDump, null, 2));
        const link = document.createElement("a");
        link.setAttribute("href", dataStr);
        link.setAttribute("download", `chaidude_database_backup_${Date.now()}.json`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setSyncStatus({ state: 'success', message: 'Backup file downloaded successfully!' });
      };

      const handleImportBackup = (event) => {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (data.customCategories) setCustomCategories(data.customCategories);
            if (data.menu) setMenuItems(data.menu);
            if (data.orders) setOrders(data.orders);
            if (data.expenses) setExpenses(data.expenses);
            if (data.googleSheetUrl !== undefined) setGoogleSheetUrl(data.googleSheetUrl);
            if (data.isPeakTime !== undefined) setIsPeakTime(data.isPeakTime);
            if (data.peakSurgePct !== undefined) setPeakSurgePct(data.peakSurgePct);
            if (data.tokenNumber !== undefined) setTokenNumber(data.tokenNumber);
            if (data.printerWidth !== undefined) setPrinterWidth(data.printerWidth);
            if (data.printerAddress !== undefined) setPrinterAddress(data.printerAddress);
            if (data.printerPhone !== undefined) setPrinterPhone(data.printerPhone);
            if (data.printerGreeting !== undefined) setPrinterGreeting(data.printerGreeting);

            setSyncStatus({ state: 'success', message: 'Database State restored successfully!' });
          } catch (err) {
            alert('Failed to parse database file. Make sure it is a valid backup JSON file.');
          }
        };
        reader.readAsText(file);
      };

      const saveMenuItemEdit = (e) => {
        e.preventDefault();
        setMenuItems(prev => prev.map(item => item.id === editingItem.id ? editingItem : item));
        setEditingItem(null);
      };

      const handleAddQuickCustomItem = (e) => {
        e.preventDefault();
        const price = Number(customItemPrice);
        if (customItemName && !isNaN(price) && price > 0) {
          const customProduct = {
            id: 'custom-' + Date.now(),
            name: customItemName,
            price: price,
            category: 'Quick Sale',
            available: true
          };
          addToCart(customProduct);
          setCustomItemName('');
          setCustomItemPrice('');
          setCustomItemModal(false);
        }
      };

      const handleAddNewMenuItem = (e) => {
        e.preventDefault();
        const priceNum = Number(newItemForm.price);
        if (!newItemForm.name || isNaN(priceNum) || priceNum <= 0) {
          alert('Please enter a valid item name and price.');
          return;
        }

        const addedProduct = {
          id: 'item-' + Date.now(),
          name: newItemForm.name,
          price: priceNum,
          category: newItemForm.category,
          available: true
        };

        setMenuItems(prev => [...prev, addedProduct]);
        setNewItemForm({
          name: '',
          category: newItemForm.category,
          price: ''
        });
        setSyncStatus({ state: 'success', message: `Added "${addedProduct.name}" to ${addedProduct.category}!` });
      };

      const handleDeleteMenuItem = (itemId, itemName) => {
        if (confirm(`Are you sure you want to delete "${itemName}" from the menu?`)) {
          setMenuItems(prev => prev.filter(item => item.id !== itemId));
          setSyncStatus({ state: 'success', message: `Deleted "${itemName}" from menu.` });
        }
      };

      const handleAddCategory = (e) => {
        e.preventDefault();
        const trimmed = newCategoryName.trim();
        if (trimmed && !categories.includes(trimmed)) {
          setCustomCategories(prev => [...prev, trimmed]);
          setNewCategoryName('');
          setSyncStatus({ state: 'success', message: `Added new category "${trimmed}"!` });
        }
      };

      const handleVerifyPin = (e) => {
        e.preventDefault();
        if (enteredPin === pinCode) {
          setIsPinUnlocked(true);
          setEnteredPin('');
        } else {
          alert('Incorrect Security PIN. Access Denied.');
          setEnteredPin('');
        }
      };

      return (
        <div className="min-h-screen bg-orange-50/50 flex flex-col text-stone-800 font-sans">
          
          <header className="bg-amber-800 text-amber-50 shadow-md sticky top-0 z-40 px-4 py-3 flex flex-wrap justify-between items-center gap-2">
            <div className="flex items-center gap-3">
              <div className="bg-amber-900 text-amber-300 p-2 rounded-full border border-amber-700 shadow-inner">
                <Icons.Coffee />
              </div>
              <div>
                <h1 className="text-xl md:text-2xl font-black tracking-wide">MR. CHAI DUDE</h1>
                <p className="text-xs text-amber-200 uppercase font-semibold tracking-wider">POS & Receipts Suite</p>
              </div>
            </div>

            <div className="flex items-center gap-2 bg-amber-955/50 px-3 py-1.5 rounded-full border border-amber-700/60">
              <span className="relative flex h-2.5 w-2.5">
                <span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${isPeakTime ? 'bg-rose-400' : 'bg-stone-400'}`}></span>
                <span className={`relative inline-flex rounded-full h-2.5 w-2.5 ${isPeakTime ? 'bg-rose-500' : 'bg-stone-500'}`}></span>
              </span>
              <span className="text-xs font-semibold">
                Peak Hours Mode: {isPeakTime ? <span className="text-rose-300 font-bold">ACTIVE (+{peakSurgePct}%)</span> : <span className="text-stone-300 font-bold">STANDARD</span>}
              </span>

      data.chargeOrExpense,

                        <p style={{ margin: '2px 0 0 0' }}><b>Date & Time:</b> {completedOrderForPrint.timestamp}</p>
                      </div>
                    </div>

                    <table style={{ width: '100%', marginTop: '25px', borderCollapse: 'collapse', textAlign: 'left' }}>
                      <thead>
                        <tr style={{ backgroundColor: '#f5f5f4', borderBottom: '2px solid #e7e5e4', fontSize: '13px', fontWeight: 'bold' }}>
                          <th style={{ padding: '10px' }}>Item Description</th>
                          <th style={{ padding: '10px', textAlign: 'center', width: '100px' }}>Quantity</th>
                          <th style={{ padding: '10px', textAlign: 'right', width: '120px' }}>Unit Price</th>
                          <th style={{ padding: '10px', textAlign: 'right', width: '120px' }}>Total Amount</th>
                        </tr>
                      </thead>
                      <tbody>
                        {completedOrderForPrint.items && completedOrderForPrint.items.map((it, i) => (
                          <tr key={i} style={{ borderBottom: '1px solid #e7e5e4' }}>
                            <td style={{ padding: '12px 10px', fontWeight: 'bold' }}>{it.name}</td>
                            <td style={{ padding: '12px 10px', textAlign: 'center' }}>{it.quantity}</td>
                            <td style={{ padding: '12px 10px', textAlign: 'right' }}>₹{it.price}</td>
                            <td style={{ padding: '12px 10px', textAlign: 'right', fontWeight: 'bold' }}>₹{it.price * it.quantity}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>

                    <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: '20px' }}>
                      <div style={{ width: '280px', fontSize: '14px', lineHeight: '1.6' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', padding: '4px 0' }}>
                          <span>Subtotal:</span>
                          <span>₹{completedOrderForPrint.subtotal}</span>
                        </div>
                        {completedOrderForPrint.peakSurge > 0 && (
                          <div style={{ display: 'flex', justifyContent: 'space-between', padding: '4px 0', color: '#b91c1c' }}>
                            <span>Peak Hour Surcharge:</span>
                            <span>+₹{completedOrderForPrint.peakSurge}</span>
                          </div>
                        )}
                        {completedOrderForPrint.discount > 0 && (
                          <div style={{ display: 'flex', justifyContent: 'space-between', padding: '4px 0', color: '#15803d' }}>
                            <span>Discount Deducted:</span>
                            <span>-₹{completedOrderForPrint.discount}</span>
                          </div>
                        )}
                        <div style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderTop: '2px dashed #a8a29e', marginTop: '6px', fontWeight: '900', fontSize: '18px', color: '#78350f' }}>
                          <span>NET PAYABLE:</span>
                          <span>₹{completedOrderForPrint.total}</span>
                        </div>
                      </div>
                    </div>

                    <div style={{ marginTop: '50px', borderTop: '1px solid #e7e5e4', paddingTop: '15px', textAlign: 'center', fontSize: '13px' }}>
                      <p style={{ margin: '0', fontWeight: 'bold' }}>Paid via: {completedOrderForPrint.paymentMethod}</p>
                      <p style={{ margin: '5px 0 0 0', fontStyle: 'italic', color: '#555' }}>{printerGreeting}</p>
                    </div>
                  </div>
                ) : (
                  <div style={{ width: printerWidth === '58mm' ? '200px' : '280px', margin: '0 auto', fontSize: '11px', lineHeight: '1.2', fontFamily: 'monospace' }}>
                    <div style={{ textAlign: 'center', fontWeight: 'bold', fontSize: '14px' }}>MR. CHAI DUDE</div>
                    <div style={{ textAlign: 'center', fontSize: '9px' }}>{printerAddress}</div>
                    <div style={{ textAlign: 'center', fontSize: '9px' }}>Ph: {printerPhone}</div>
                    <div style={{ borderBottom: '1px dashed black', margin: '6px 0' }}></div>
                    
                    <div style={{ textAlign: 'center', fontWeight: 'bold', fontSize: '13px' }}>TOKEN #: #{completedOrderForPrint.tokenNo || '-'}</div>
                    <div>ID: {completedOrderForPrint.id}</div>
                    <div>Date: {completedOrderForPrint.timestamp}</div>
                    <div style={{ borderBottom: '1px dashed black', margin: '6px 0' }}></div>

                    <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '11px', fontFamily: 'monospace' }}>
                      <thead>
                        <tr style={{ borderBottom: '1px dashed black' }}>
                          <th style={{ textAlign: 'left', width: '50%' }}>Item</th>
                          <th style={{ textAlign: 'center', width: '25%' }}>Qty</th>
                          <th style={{ textAlign: 'right', width: '25%' }}>Price</th>
                        </tr>
                      </thead>
                      <tbody>
                        {completedOrderForPrint.items && completedOrderForPrint.items.map((it, i) => (
                          <tr key={i}>
                            <td>{it.name}</td>
                            <td style={{ textAlign: 'center' }}>x{it.quantity}</td>
                            <td style={{ textAlign: 'right' }}>₹{it.price * it.quantity}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>

                    <div style={{ borderBottom: '1px dashed black', margin: '6px 0' }}></div>
                    <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                      <span>Subtotal:</span>
                      <span>₹{completedOrderForPrint.subtotal}</span>
                    </div>
                    {completedOrderForPrint.peakSurge > 0 && (
                      <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                        <span>Peak Surge:</span>
                        <span>+₹{completedOrderForPrint.peakSurge}</span>
                      </div>
                    )}
                    {completedOrderForPrint.discount > 0 && (
                      <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                        <span>Discount:</span>
                        <span>-₹{completedOrderForPrint.discount}</span>
                      </div>
                    )}
                    <div style={{ borderBottom: '1px dashed black', margin: '4px 0' }}></div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontWeight: 'bold', fontSize: '12px' }}>
                      <span>NET TOTAL:</span>
                      <span>₹{completedOrderForPrint.total}</span>
                    </div>
                    <div style={{ borderBottom: '1px dashed black', margin: '6px 0' }}></div>
                    <div style={{ textAlign: 'center', fontSize: '9px', fontWeight: 'bold' }}>Paid via: {completedOrderForPrint.paymentMethod}</div>
                    <div style={{ textAlign: 'center', fontSize: '9px', marginTop: '6px' }}>{printerGreeting}</div>
                  </div>
                )
              ) : (
                <div style={{ width: (printerWidth === '58mm' || printerWidth === '80mm') ? (printerWidth === '58mm' ? '200px' : '280px') : '400px', margin: '0 auto', fontSize: '12px', lineHeight: '1.3', fontFamily: 'monospace' }}>
                  <div style={{ textAlign: 'center', fontWeight: 'bold', fontSize: '13px' }}>KITCHEN SLIP</div>
                  <div style={{ textAlign: 'center', fontWeight: 'bold', fontSize: '15px' }}>MR. CHAI DUDE</div>
                  <div style={{ borderBottom: '1px dashed black', margin: '6px 0' }}></div>
                  <div style={{ textAlign: 'center', fontWeight: 'bold', fontSize: '16px' }}>TOKEN #: #{completedOrderForPrint.tokenNo || '-'}</div>
                  <div>ID: {completedOrderForPrint.id}</div>
                  <div>Date: {completedOrderForPrint.timestamp}</div>
                  <div style={{ borderBottom: '1px dashed black', margin: '6px 0' }}></div>
                  
                  <table style={{ width: '100%', fontSize: '14px', fontWeight: 'bold', fontFamily: 'monospace' }}>
                    <thead>
                      <tr style={{ borderBottom: '1px dashed black' }}>
                        <th style={{ textAlign: 'left' }}>Item Description</th>
                        <th style={{ textAlign: 'right', width: '60px' }}>Qty</th>
                      </tr>
                    </thead>
                    <tbody>
                      {completedOrderForPrint.items && completedOrderForPrint.items.map((it, i) => (
                        <tr key={i}>
                          <td>{it.name}</td>
                          <td style={{ textAlign: 'right' }}>x{it.quantity}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}

          <footer className="bg-amber-955 text-amber-200/60 px-4 py-3 text-center text-xs border-t border-amber-900 flex flex-col sm:flex-row justify-between items-center gap-2">
            <p className="font-semibold">MR. CHAI DUDE POS - Responsive Web &amp; Mobile Client</p>
            <p className="text-[11px] font-medium text-amber-400">
              State Saved Locally in Device Browser Cache 
            </p>
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
